<div class="dashboard">
  <header class="dashboard__header" [style.background-color]="config.color">
    <svg class="dashboard__k8s-logo" viewBox="0 0 722.9 702" xmlns="http://www.w3.org/2000/svg" aria-label="Kubernetes logo">
      <path fill="rgba(255,255,255,0.9)" d="M360.1 0a353.4 353.4 0 0 0-124 22.4L58.4 125.5A120.8 120.8 0 0 0 0 235v232a120.8 120.8 0 0 0 58.4 109.5l177.7 103a353.4 353.4 0 0 0 248 0l177.7-103A120.8 120.8 0 0 0 720 467V235a120.8 120.8 0 0 0-58.4-109.5L484 22.4A353.4 353.4 0 0 0 360.1 0zm.4 117.6a14.6 14.6 0 0 1 8.5 2.7l3 2 169.7 145a14.5 14.5 0 0 1 4.8 13.2l-.7 3.6-44.4 214a14.5 14.5 0 0 1-9.6 10.7l-3.5.8-217.6 27.3a14.5 14.5 0 0 1-13.4-5.8l-2.2-3.2-115-192.5a14.5 14.5 0 0 1-.4-13.8l1.7-3.3 109.4-195.7a14.5 14.5 0 0 1 11-7.8l3.7-.2z"/>
    </svg>
    <h1 class="dashboard__title">Kubernetes Demo App</h1>
  </header>

  <main class="dashboard__body">
    <div class="dashboard__env-badge" [style.background-color]="config.color">
      {{ config.environment }}
    </div>

    <div class="dashboard__info">
      <div class="dashboard__row">
        <span class="dashboard__label">Environment</span>
        <span class="dashboard__value">{{ config.environment }}</span>
      </div>
      <div class="dashboard__row">
        <span class="dashboard__label">Version</span>
        <span class="dashboard__value">{{ config.version }}</span>
      </div>
      <div class="dashboard__row">
        <span class="dashboard__label">Pod Name</span>
        <span class="dashboard__value dashboard__value--mono">{{ config.podName }}</span>
      </div>
      <div class="dashboard__row">
        <span class="dashboard__label">Built</span>
        <span class="dashboard__value dashboard__value--mono">{{ config.buildTime }}</span>
      </div>
      <div class="dashboard__row">
        <span class="dashboard__label">API Status</span>
        <span
          class="dashboard__status"
          [class.dashboard__status--healthy]="apiStatus() === 'healthy'"
          [class.dashboard__status--degraded]="apiStatus() === 'degraded'"
          [class.dashboard__status--checking]="apiStatus() === 'checking'"
        >
          <span class="dashboard__status-dot"></span>
          {{ statusLabel() }}
        </span>
      </div>
    </div>

    <button class="dashboard__refresh-btn" [style.background-color]="config.color" (click)="checkStatus()">
      Refresh Status
    </button>
  </main>
</div>
